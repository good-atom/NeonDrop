name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: false
      - run: go test ./...
      - run: go vet ./...
      - run: go build -trimpath ./cmd/neondrop
